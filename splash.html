<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; background:#f0f0f0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:0; }
#app { width:390px; height:844px; background:#fff; position:relative; overflow:hidden; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; background:#fff; overflow:hidden; }
::-webkit-scrollbar { display:none; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            width: 390px;
            height: 844px;
            background: #fff;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #111, 0 0 0 13px #333,
                        0 40px 80px rgba(0,0,0,.7),
                        0 0 60px rgba(249,115,22,.15);
        }
        #app::before {
            content:'';
            position: absolute; top:0; left:50%; transform:translateX(-50%);
            width:110px; height:28px;
            background:#111; border-radius:0 0 18px 18px; z-index:999;
        }

        .screen {
            position: absolute; inset: 0;
            display: none !important;
            flex-direction: column;
            background: #fff;
            overflow: hidden;
        }
        .screen.active {
            display: flex !important;
            
        }
        
        }
        ::-webkit-scrollbar { display:none; }

        /* ── shared ── */
        .scroll { flex:1; overflow-y:auto; }
        .pb-nav { padding-bottom:72px; }

        .top-bar {
            padding: 42px 18px 0;
            background:#fff;
            border-bottom:1px solid #f3f4f6;
            position:sticky; top:0; z-index:40;
            flex-shrink:0;
        }
        .top-row { display:flex; justify-content:space-between; align-items:center; padding-bottom:12px; }
        .logo { font-size:22px; font-weight:900; color:#f97316; letter-spacing:-1px; }
        .icon-row { display:flex; gap:14px; }
        .icon-btn { background:none; border:none; font-size:20px; cursor:pointer; }

        .tabs { display:flex; }
        .tab {
            flex:1; text-align:center; padding-bottom:10px;
            font-size:13px; font-weight:600; color:#9ca3af;
            cursor:pointer; position:relative; border:none; background:none;
        }
        .tab.on { color:#f97316; font-weight:800; }
        .tab.on::after {
            content:''; position:absolute; bottom:0; left:15%; right:15%;
            height:3px; background:#f97316; border-radius:99px;
        }

        .filter-row {
            display:flex; gap:7px; overflow-x:auto;
            padding:10px 16px; background:#fff;
            border-bottom:1px solid #f3f4f6; flex-shrink:0;
        }
        .fbtn {
            white-space:nowrap; padding:6px 14px;
            border-radius:99px; font-size:12px; font-weight:600;
            border:1.5px solid #e5e7eb; color:#6b7280;
            cursor:pointer; background:#fff; flex-shrink:0;
        }
        .fbtn.on { background:#fff7ed; border-color:#f97316; color:#ea580c; }

        .bnav {
            position:absolute; bottom:0; left:0; right:0; height:72px;
            background:#fff; border-top:1px solid #f0f0f0;
            display:flex; align-items:center; justify-content:space-around;
            padding-bottom:10px;
            box-shadow:0 -4px 16px rgba(0,0,0,.05); z-index:50;
        }
        .ni { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
        .ni .ic { font-size:22px; }
        .ni .lb { font-size:10px; font-weight:600; color:#9ca3af; }
        .ni.on .lb { color:#f97316; }

        /* ── splash ── */
        .splash {
            background:linear-gradient(155deg,#ff6b00,#f97316 55%,#ff9a4a);
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            padding:40px 32px; height:100%; position:relative; overflow:hidden;
        }
        .splash::before {
            content:''; position:absolute; top:-100px; right:-80px;
            width:320px; height:320px; background:rgba(255,255,255,.07); border-radius:50%;
        }
        .splash::after {
            content:''; position:absolute; bottom:-80px; left:-60px;
            width:250px; height:250px; background:rgba(255,255,255,.05); border-radius:50%;
        }
         }
        .float {  }

        .btn-white {
            width:100%; background:#fff; color:#f97316;
            font-weight:800; font-size:16px; padding:16px; border-radius:18px; border:none;
            cursor:pointer; transition:all .2s; box-shadow:0 8px 30px rgba(0,0,0,.15);
        }
        .btn-white:hover { transform:translateY(-2px); }

        /* ── onboarding ── */
        .ob-body { flex:1; overflow-y:auto; padding:20px 20px 0; }
        .ob-foot { background:#fff; padding:16px 20px 28px; border-top:1px solid #f3f4f6; flex-shrink:0; }
        .step-badge {
            display:inline-flex; align-items:center; padding:3px 10px;
            background:#fff7ed; color:#ea580c; border-radius:99px;
            font-size:11px; font-weight:700; border:1px solid #fed7aa; margin-right:8px;
        }
        .period-btn {
            flex:1; padding:12px 4px; border:1.5px solid #e5e7eb; border-radius:14px;
            font-size:12px; font-weight:600; color:#6b7280; cursor:pointer; background:#fff;
            transition:all .2s; text-align:center;
        }
        .period-btn.on {
            background:linear-gradient(135deg,#fff7ed,#ffedd5);
            border-color:#f97316; color:#ea580c;
            box-shadow:0 2px 8px rgba(249,115,22,.2);
        }
        .ebox {
            background:linear-gradient(135deg,#fff7ed,#ffedd5);
            border:1.5px solid #fed7aa; border-radius:18px;
            padding:18px; text-align:center; margin-top:14px;
        }
        input[type=range] {
            -webkit-appearance:none; width:100%; height:6px;
            background:linear-gradient(90deg,#f97316 50%,#e5e7eb 50%);
            border-radius:99px; outline:none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance:none; width:24px; height:24px;
            background:linear-gradient(135deg,#ff6b00,#f97316);
            border-radius:50%; cursor:pointer;
            box-shadow:0 2px 10px rgba(249,115,22,.5); border:3px solid #fff;
        }
        .btn-primary {
            width:100%; background:linear-gradient(135deg,#ff6b00,#f97316);
            color:#fff; font-weight:800; font-size:15px; padding:15px;
            border-radius:16px; border:none; cursor:pointer; transition:all .2s;
            box-shadow:0 4px 20px rgba(249,115,22,.35); letter-spacing:-.3px;
        }
        .btn-primary:hover { transform:translateY(-1px); }

        /* ── user cards ── */
        .ucard {
            background:#fff; border-radius:20px; padding:16px;
            border:1.5px solid #f3f4f6; cursor:pointer;
            transition:all .22s cubic-bezier(.34,1.4,.64,1);
            box-shadow:0 2px 10px rgba(0,0,0,.05);
        }
        .ucard:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.1); border-color:#fed7aa; }
        .tchip { font-size:11px; font-weight:700; color:#f97316; background:#fff7ed; padding:2px 7px; border-radius:8px; }
        .chip  { display:inline-flex; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:600; background:#f3f4f6; color:#6b7280; }
        .fav   { background:none; border:none; font-size:22px; cursor:pointer; color:#d1d5db; line-height:1; }
        .fav:hover { color:#f9a8d4; }

        .cbanner {
            margin:14px 16px 0;
            background:linear-gradient(130deg,#ff6b00,#f97316 60%,#fb923c);
            border-radius:20px; padding:14px 16px; color:#fff;
            cursor:pointer; display:flex; justify-content:space-between; align-items:center;
            box-shadow:0 6px 20px rgba(249,115,22,.35); transition:all .2s;
            position:relative; overflow:hidden;
        }
        .cbanner::before {
            content:''; position:absolute; top:-20px; right:-20px;
            width:80px; height:80px; background:rgba(255,255,255,.1); border-radius:50%;
        }
        .cbanner:hover { transform:scale(1.01); }

        /* ── contest cards ── */
        .ccard {
            background:#fff; border-radius:20px; padding:20px 20px 16px;
            box-shadow:0 2px 12px rgba(0,0,0,.06); border:1.5px solid #f3f4f6;
            transition:all .22s cubic-bezier(.34,1.2,.64,1);
        }
        .ccard:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(0,0,0,.1); }
        .cbadge { display:inline-flex; align-items:center; padding:5px 12px; border-radius:99px; font-size:12px; font-weight:700; }
        .cb-blue   { background:#eff6ff; color:#2563eb; }
        .cb-green  { background:#ecfdf5; color:#059669; }
        .cb-red    { background:#fef2f2; color:#dc2626; }
        .cb-purple { background:#f5f3ff; color:#7c3aed; }
        .ctitle { font-size:17px; font-weight:800; color:#111827; letter-spacing:-.5px; line-height:1.35; margin:10px 0 5px; }
        .csub   { font-size:12px; color:#9ca3af; margin-bottom:14px; }
        .cmrow  {
            display:flex; align-items:center; justify-content:space-between;
            background:#f9fafb; border-radius:14px; padding:10px 14px; margin-bottom:14px;
        }
        .avstack { display:flex; }
        .av {
            width:30px; height:30px; border-radius:50%;
            border:2.5px solid #fff; display:flex; align-items:center;
            justify-content:center; font-size:14px;
        }
        .av+.av { margin-left:-10px; }
        .av-more { background:#e5e7eb; color:#6b7280; font-size:10px; font-weight:700; }

        /* primary orange ghost */
        .join-btn {
            width:100%; background:#fff8f2; border:1.5px solid #ffcba0;
            color:#f97316; font-size:14px; font-weight:700; padding:13px;
            border-radius:14px; cursor:pointer; letter-spacing:-.3px;
            display:flex; align-items:center; justify-content:center; gap:6px;
            transition:all .2s;
        }
        .join-btn:hover { background:#fff0e0; border-color:#f97316; }
        /* grey ghost */
        .join-btn-g {
            width:100%; background:#f9fafb; border:1.5px solid #e5e7eb;
            color:#6b7280; font-size:14px; font-weight:700; padding:13px;
            border-radius:14px; cursor:pointer; letter-spacing:-.3px;
            display:flex; align-items:center; justify-content:center; gap:6px;
            transition:all .2s;
        }
        .join-btn-g:hover { background:#f3f4f6; }

        /* ── smart curation ── */
        .sc-bg { background:linear-gradient(160deg,#0f172a 0%,#1e293b 60%,#0f172a 100%); }
        .sc-hdr {
            background:rgba(15,23,42,.95); backdrop-filter:blur(10px);
            padding:44px 16px 14px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid rgba(255,255,255,.06);
            position:sticky; top:0; z-index:40; flex-shrink:0;
        }
        .dcard {
            background:linear-gradient(135deg,#1e293b,#0f172a);
            border:1px solid rgba(255,255,255,.08);
            border-radius:24px; padding:20px; position:relative; overflow:hidden;
        }
        .dcard::before {
            content:''; position:absolute; top:0; left:0; right:0;
            height:2px; background:linear-gradient(90deg,#f97316,#fb923c,#f97316);
        }
        .mbadge {
            background:rgba(249,115,22,.15); border:1.5px solid rgba(249,115,22,.4);
            color:#fb923c; font-weight:900; padding:6px 12px; border-radius:12px; font-size:14px;
        }
        .rrow {
            display:flex; align-items:flex-start; gap:8px;
            background:rgba(255,255,255,.05); border-radius:14px; padding:10px 12px;
        }

        /* ── profile ── */
        .pav {
            width:80px; height:80px; border-radius:24px;
            display:flex; align-items:center; justify-content:center; font-size:36px;
            border:3px solid #fff; box-shadow:0 8px 25px rgba(0,0,0,.12);
        }
        .tbar-track { background:#f3f4f6; height:10px; border-radius:99px; overflow:hidden; }
        .tbar-fill {
            height:100%; border-radius:99px;
            background:linear-gradient(90deg,#fbbf24,#f97316,#dc2626);
            position:relative; overflow:hidden;
        }
        .tbar-fill::after {
            content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
            
        }
        
        .revrow {
            display:flex; justify-content:space-between; align-items:center;
            background:#f9fafb; border:1px solid #f3f4f6; border-radius:14px; padding:12px 14px;
        }
        .chart-sm { position:relative; width:100%; height:140px; }
    
</style>
</head>
<body>
<div id="app"><div id="s-splash" style="display:flex;flex-direction:column;position:absolute;inset:0;overflow:hidden;">
  <div class="splash">
    <div class="float" style="margin-bottom:28px">
      <svg width="120" height="85" viewBox="0 0 160 110" fill="none">
        <circle cx="45" cy="20" r="16" fill="white"/>
        <circle cx="115" cy="20" r="16" fill="white"/>
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M10 50C10 42.268 16.268 36 24 36H66C73.732 36 80 42.268 80 50V58C71.163 58 64 65.163 64 74C64 82.837 71.163 90 80 90V96C80 103.732 73.732 110 66 110H24C16.268 110 10 103.732 10 96V50ZM45 112C52.732 112 59 105.732 59 98C59 90.268 52.732 84 45 84C37.268 84 31 90.268 31 98C31 105.732 37.268 112 45 112Z"
          fill="white"/>
        <circle cx="45" cy="110" r="16" fill="#f97316"/>
        <path d="M84 50C84 42.268 90.268 36 98 36H140C147.732 36 154 42.268 154 50V96C154 103.732 147.732 110 140 110H98C90.268 110 84 103.732 84 96V90C75.163 90 68 82.837 68 74C68 65.163 75.163 58 84 58V50Z"

      </svg>
    </div>
    <h1 style="font-size:54px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;margin-bottom:8px">티밋</h1>
    <p style="color:rgba(255,255,255,.8);font-size:16px;font-weight:500;margin-bottom:52px">나에게 딱 맞는 팀</p>
    <button class="btn-white">티밋 시작하기</button>
    <p style="color:rgba(255,255,255,.6);font-size:13px;margin-top:18px;cursor:pointer">이미 계정이 있나요? <u>로그인</u></p>
    <div style="position:absolute;bottom:70px;right:34px;width:14px;height:14px;background:rgba(255,255,255,.25);border-radius:50%"></div>
    <div style="position:absolute;top:130px;left:28px;width:9px;height:9px;background:rgba(255,255,255,.2);border-radius:50%"></div>

  </div>
</div>
