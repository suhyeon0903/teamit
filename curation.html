<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; background:#f0f0f0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
#app { width:390px; height:844px; background:linear-gradient(160deg,#0f172a 0%,#1e293b 60%,#0f172a 100%); position:relative; overflow:hidden; display:flex; flex-direction:column; }
::-webkit-scrollbar { display:none; }
.sc-hdr { background:rgba(15,23,42,.95); padding:44px 16px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
.back-btn { background:rgba(255,255,255,.1); border:none; color:#fff; width:36px; height:36px; border-radius:12px; font-size:18px; display:flex; align-items:center; justify-content:center; }
.scroll { flex:1; overflow-y:auto; padding:20px 18px 30px; }
.dcard { background:linear-gradient(135deg,#1e293b,#0f172a); border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:20px; position:relative; overflow:hidden; }
.dcard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#f97316,#fb923c,#f97316); }
.mbadge { background:rgba(249,115,22,.15); border:1.5px solid rgba(249,115,22,.4); color:#fb923c; font-weight:900; padding:6px 12px; border-radius:12px; font-size:14px; }
.rrow { display:flex; align-items:flex-start; gap:8px; background:rgba(255,255,255,.05); border-radius:14px; padding:10px 12px; }
.btn-primary { width:100%; background:linear-gradient(135deg,#ff6b00,#f97316); color:#fff; font-weight:800; font-size:15px; padding:15px; border-radius:16px; border:none; box-shadow:0 0 20px rgba(249,115,22,.4); letter-spacing:-.3px; }
</style>
</head>
<body>
<div id="app">
  <div class="sc-hdr">
    <button class="back-btn">‹</button>
    <h2 style="font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px">티밋 스마트 매칭</h2>
    <div style="width:36px"></div>
  </div>

  <div class="scroll">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:8px">💡</div>
      <h2 style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px">당신을 위한 <span style="color:#fb923c">Perfect Match!</span></h2>
      <p style="font-size:12px;color:#9ca3af;line-height:1.6">내 프로필 데이터를 분석하여<br>가장 알맞은 동료를 찾았습니다.</p>
    </div>

    <div class="dcard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:50px;height:50px;background:#fce7f3;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:24px">👨‍🎨</div>
          <div>
            <p style="font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px">디자인천재</p>
            <p style="font-size:11px;color:#9ca3af;margin-top:2px">UXUI 디자이너 · 마포구</p>
          </div>
        </div>
        <span class="mbadge">Fit 95%</span>
      </div>

      <!-- SVG 레이더 차트 (canvas 대체) -->
      <div style="background:rgba(0,0,0,.3);border-radius:16px;padding:10px;margin-bottom:16px;border:1px solid rgba(255,255,255,.06)">
        <svg viewBox="0 0 280 220" width="100%" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(140,115)">
            <!-- 그리드 (오각형 5단계) -->
            <polygon points="0,-80 76,-26 47,68 -47,68 -76,-26"   fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <polygon points="0,-64 61,-21 38,54 -38,54 -61,-21"   fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <polygon points="0,-48 46,-16 28,41 -28,41 -46,-16"   fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <polygon points="0,-32 30,-10 19,27 -19,27 -30,-10"   fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <polygon points="0,-16 15,-5  9,14  -9,14  -15,-5"    fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <!-- 축선 -->
            <line x1="0" y1="0" x2="0"   y2="-80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="0" y1="0" x2="76"  y2="-26" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="0" y1="0" x2="47"  y2="68"  stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="0" y1="0" x2="-47" y2="68"  stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="0" y1="0" x2="-76" y2="-26" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

            <!-- 나 (기획): 90,80,100,85,90 -->
            <polygon
              points="0,-72 61,-21 47,68 -40,68 -68,-23"
              fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
            <circle cx="0"   cy="-72" r="3" fill="white"/>
            <circle cx="61"  cy="-21" r="3" fill="white"/>
            <circle cx="47"  cy="68"  r="3" fill="white"/>
            <circle cx="-40" cy="68"  r="3" fill="white"/>
            <circle cx="-68" cy="-23" r="3" fill="white"/>

            <!-- 상대 (디자인): 95,90,100,95,85 -->
            <polygon
              points="0,-76 68,-23 47,68 -45,68 -65,-22"
              fill="rgba(249,115,22,0.25)" stroke="#f97316" stroke-width="2"/>
            <circle cx="0"   cy="-76" r="3" fill="#f97316"/>
            <circle cx="68"  cy="-23" r="3" fill="#f97316"/>
            <circle cx="47"  cy="68"  r="3" fill="#f97316"/>
            <circle cx="-45" cy="68"  r="3" fill="#f97316"/>
            <circle cx="-65" cy="-22" r="3" fill="#f97316"/>

            <!-- 레이블 -->
            <text x="0"   y="-88"  text-anchor="middle" font-size="9" fill="#9ca3af" font-family="Noto Sans KR, sans-serif">에너지(열정)</text>
            <text x="84"  y="-26"  text-anchor="start"  font-size="9" fill="#9ca3af" font-family="Noto Sans KR, sans-serif">오프라인 선호</text>
            <text x="52"  y="82"   text-anchor="middle" font-size="9" fill="#9ca3af" font-family="Noto Sans KR, sans-serif">기간 적합도</text>
            <text x="-52" y="82"   text-anchor="middle" font-size="9" fill="#9ca3af" font-family="Noto Sans KR, sans-serif">스킬 매칭</text>
            <text x="-84" y="-26"  text-anchor="end"    font-size="9" fill="#9ca3af" font-family="Noto Sans KR, sans-serif">소통 방식</text>
          </g>

          <!-- 범례 -->
          <circle cx="60"  cy="205" r="5" fill="white"/>
          <text   x="70"   y="209" font-size="9" fill="#e5e7eb" font-family="Noto Sans KR, sans-serif">나 (기획)</text>
          <circle cx="155" cy="205" r="5" fill="#f97316"/>
          <text   x="165"  y="209" font-size="9" fill="#e5e7eb" font-family="Noto Sans KR, sans-serif">상대 (디자인)</text>
        </svg>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
        <div class="rrow">
          <span style="color:#4ade80;font-size:14px;flex-shrink:0">✔</span>
          <div>
            <p style="font-size:12px;font-weight:700;color:#e5e7eb">목표치(에너지)가 잘 맞아요!</p>
            <p style="font-size:10px;color:#9ca3af;margin-top:3px">둘 다 8 이상으로 높은 편이에요. 혼신의 힘을 다할 준비 완료!</p>
          </div>
        </div>
        <div class="rrow">
          <span style="color:#4ade80;font-size:14px;flex-shrink:0">✔</span>
          <div>
            <p style="font-size:12px;font-weight:700;color:#e5e7eb">상호 보완적인 기술 스택</p>
            <p style="font-size:10px;color:#9ca3af;margin-top:3px">나의 #기획 역량과 상대의 #디자인 역량이 완벽한 시너지를 냅니다.</p>
          </div>
        </div>
      </div>

      <button class="btn-primary">상세 프로필 확인하기 →</button>
    </div>
  </div>
</div>
</body>
</html>
